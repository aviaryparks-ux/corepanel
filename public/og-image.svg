<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d27"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#a855f7" opacity="0.1"/>
  <circle cx="600" cy="315" r="300" fill="#60a5fa" opacity="0.05"/>

  <!-- Logo icon -->
  <rect x="100" y="180" width="80" height="80" rx="20" fill="url(#text)"/>
  <text x="140" y="240" font-family="Arial" font-size="40" font-weight="bold" fill="white" text-anchor="middle">&lt;/&gt;</text>

  <!-- Company name -->
  <text x="200" y="240" font-family="Inter, Arial" font-size="60" font-weight="bold" fill="url(#text)">DevSolution</text>

  <!-- Tagline -->
  <text x="600" y="340" font-family="Inter, Arial" font-size="32" fill="#9ca3af" text-anchor="middle">Jasa Pembuatan Aplikasi</text>
  <text x="600" y="390" font-family="Inter, Arial" font-size="32" fill="#9ca3af" text-anchor="middle">Web, Mobile & Panel Admin</text>

  <!-- Stats badges -->
  <rect x="200" y="450" width="200" height="60" rx="30" fill="#1f2937" stroke="#3b82f6" stroke-width="1"/>
  <text x="300" y="490" font-family="Inter, Arial" font-size="24" font-weight="600" fill="#60a5fa" text-anchor="middle">100+ Project</text>

  <rect x="420" y="450" width="200" height="60" rx="30" fill="#1f2937" stroke="#a855f7" stroke-width="1"/>
  <text x="520" y="490" font-family="Inter, Arial" font-size="24" font-weight="600" fill="#a855f7" text-anchor="middle">50+ Klien</text>

  <rect x="640" y="450" width="200" height="60" rx="30" fill="#1f2937" stroke="#22c55e" stroke-width="1"/>
  <text x="740" y="490" font-family="Inter, Arial" font-size="24" font-weight="600" fill="#22c55e" text-anchor="middle">5+ Tahun</text>

  <rect x="860" y="450" width="200" height="60" rx="30" fill="#1f2937" stroke="#eab308" stroke-width="1"/>
  <text x="960" y="490" font-family="Inter, Arial" font-size="24" font-weight="600" fill="#eab308" text-anchor="middle">Garansi 2x</text>

  <!-- CTA -->
  <text x="600" y="570" font-family="Inter, Arial" font-size="20" fill="#6b7280" text-anchor="middle">devsolution.id | hello@devsolution.id</text>
</svg>
